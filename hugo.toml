baseURL = 'http://43.160.220.201'
languageCode = 'zh-CN'
defaultContentLanguage = 'zh'
theme = 'blowfish'
title = '🦞 OpenClaw 技术博客'

[params]
  description = '探索 OpenClaw 小龙虾 AI 框架的无限可能，从入门到精通的技术指南'
  keywords = ['OpenClaw', 'AI', '小龙虾', '技术博客', '人工智能', '教程']
  images = ['/images/posts/ai-generated/hero-01.jpg']
  
  # Blowfish 主题配置 - 高级美化
  [params.blowfish]
    colorScheme = 'ocean'
    defaultAppearance = 'light'
    autoSwitchAppearance = true
    enableSearch = true
    enableCodeCopy = true
    showScrollToTop = true
    enableImageZoom = true
    disableImageOptimization = false
    
  # 首页配置
  [params.home]
    layout = 'profile'
    showRecent = true
    recentLimit = 9
    cardView = true
    cardViewScreenWidth = false
    
  # 作者信息
  [params.author]
    name = 'OpenClaw 技术团队'
    email = 'team@openclaw.ai'
    headline = '🦞 探索 AI 的无限可能'
    bio = '专注于 OpenClaw 小龙虾框架的技术研究与分享'
    links = [
      { github = 'https://github.com/openclaw' },
      { twitter = 'https://twitter.com/openclaw' },
      { email = 'mailto:team@openclaw.ai' },
    ]

# 菜单配置 - 带图标
[[menus.main]]
  name = '🏠 首页'
  pageRef = '/'
  weight = 10

[[menus.main]]
  name = '📝 文章'
  pageRef = '/posts'
  weight = 20

[[menus.main]]
  name = '🏷️ 标签'
  pageRef = '/tags'
  weight = 30

[[menus.main]]
  name = '📂 分类'
  pageRef = '/categories'
  weight = 40

[[menus.main]]
  name = '👤 关于'
  pageRef = '/about'
  weight = 50

# 社交媒体
[[menus.social]]
  name = 'GitHub'
  url = 'https://github.com/openclaw'
  weight = 10
  [menus.social.params]
    icon = 'github'

[[menus.social]]
  name = 'Twitter'
  url = 'https://twitter.com/openclaw'
  weight = 20
  [menus.social.params]
    icon = 'twitter'

# 输出格式
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']

# 分类和标签
[taxonomies]
  tag = 'tags'
  category = 'categories'
  author = 'authors'

# 分页 - 每页9篇，3列布局
[pagination]
  pagerSize = 9

# 图片处理 - 高质量
[imaging]
  quality = 95
  resampleFilter = 'lanczos'

# Markdown 配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'dracula'
    lineNos = true
    codeFences = true
    guessSyntax = true
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
