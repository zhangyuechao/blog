baseURL = 'https://yourdomain.com'
languageCode = 'zh-CN'
defaultContentLanguage = 'zh'
theme = 'blowfish'
title = '我的博客'

[params]
  description = '一个专注于技术与生活的博客'
  keywords = ['博客', '技术', '生活', '编程']
  images = ['/img/og-image.jpg']
  
  # Blowfish 特定配置
  [params.blowfish]
    colorScheme = 'auto'  # auto, light, dark
    defaultBackgroundImage = '/img/background.jpg'
    disableImageOptimization = false
    
  # 作者信息 (GEO 优化关键)
  [params.author]
    name = '作者名字'
    email = 'your@email.com'
    # image = '/img/avatar.svg'
    headline = '全栈开发者 | 技术博主'
    bio = '热爱编程与分享，专注于 Web 开发和 AI 技术'
    [[params.author.links]]
      github = 'https://github.com/yourusername'
    [[params.author.links]]
      twitter = 'https://twitter.com/yourusername'
    [[params.author.links]]
      email = 'mailto:your@email.com'

# SEO 和 GEO 优化配置
[params.seo]
  enable = true
  structuredData = true
  openGraph = true
  twitterCards = true

# 菜单配置
[[menus.main]]
  name = '首页'
  pageRef = '/'
  weight = 10

[[menus.main]]
  name = '文章'
  pageRef = '/posts'
  weight = 20

[[menus.main]]
  name = '关于'
  pageRef = '/about'
  weight = 30

# 输出格式配置 (SEO 关键)
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  page = ['HTML']
  section = ['HTML', 'RSS']

# RSS 配置
[outputFormats.RSS]
  mediatype = 'application/rss+xml'
  baseName = 'index'

# 分类和标签
[taxonomies]
  tag = 'tags'
  category = 'categories'
  author = 'authors'

# 分页
[pagination]
  pagerSize = 10

# 安全设置
[security]
  [security.exec]
    allow = ['^dart-sass-embedded$', '^go$', '^npx$', '^postcss$', '^git$']
    osEnv = ['(?i)^(PATH|PATHEXT|APPDATA|HOME|TMP|TEMP|XDG_CONFIG_HOME|NODE_OPTIONS)$']

# 图片处理
[imaging]
  quality = 85
  resampleFilter = 'lanczos'

# Markdown 配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true
    guessSyntax = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
